version: "3.8"

services:
  backend:
    build: ./src/backend
    ports:
      # host port : container port
      - "8080:8080"  # port of the GIN API Endpoint
    env_file:
      - .env

    volumes:
      # Map the host database file (persisted) to the container.
      - ./data:/root/db
    depends_on:
      - frontend

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL}
    ports:
      - "5173:80"
    env_file:
      - .env
  openinary:
    image: openinary/openinary:latest
    platform: linux/amd64
    ports:
      - "3001:3000"
    environment:
      BETTER_AUTH_URL: ${OPENINARY_URL}
      CORS_ORIGIN: ${OPENINARY_CORS_ORIGIN:-http://localhost:5173}
    volumes:
      - ./data/openinary/cache:/app/apps/api/cache
      - ./data/openinary/public:/app/apps/api/public
      - ./data/openinary/db:/app/data