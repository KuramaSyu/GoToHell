version: "3.8"

services:
  backend:
    build: ./src/backend
    ports:
      # host port : container port
      - "8080:8080"  # port of the GIN API Endpoint
    env_file:
      - .env

    volumes:
      # Map the host database file (persisted) to the container.
      - ./data:/root/db
    depends_on:
      - frontend

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL}
    ports:
      - "5173:80"
    env_file:
      - .env
  slink:
    image: anirdev/slink:latest
    container_name: slink
    environment:
      - TZ=UTC
      - ORIGIN=${SLINK_URL:-http://localhost:3001}
      - STORAGE_PROVIDER=local  # smb | local | s3
      - USER_APPROVAL_REQUIRED=true
      - IMAGE_MAX_SIZE=15M
      - USER_ALLOW_REGISTRATION=false
      - IMAGE_FORCE_FORMAT_CONVERSION=true
      - IMAGE_TARGET_FORMAT=webp
      - ADMIN_USERNAME=${SLINK_ADMIN_USERNAME}
      - ADMIN_EMAIL=${SLINK_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${SLINK_ADMIN_PASSWORD}
    volumes:
      # Only need to persist the database when using SMB storage
      - ./data/slink/var/data:/app/var/data
      - ./data/slink/images:/app/slink/images
    ports:
      - '3001:3000'
