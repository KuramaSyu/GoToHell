name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  frontend-ci:
    name: Frontend CI (Test + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install

      - name: Run frontend unit tests
        working-directory: src/frontend
        run: npm test -- --run

      - name: Build frontend
        run: npm run build
        working-directory: src/frontend

  backend-ci:
    name: Backend CI (Test + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Sync Go modules
        working-directory: src/backend/src
        run: go mod tidy

      - name: Run backend tests
        working-directory: src/backend/src
        run: go test ./...

      - name: Build backend binary
        working-directory: src/backend/src
        run: go build -o server

  deploy-dev:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - backend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Validate deployment secrets
        run: |
          set -e

          # Check required secrets
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS_HOST is not set!"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "VPS_USER is not set! (Repo -> Settings -> Secrets and variables -> actions)"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "VPS_SSH_KEY is not set! (Repo -> Settings -> Secrets and variables -> actions)"
            exit 1
          fi

      - name: Configure SSH access
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application via SSH and Docker Compose
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s <<'EOF'
              set -e

              cd /home/kurama/ds/gotohell/GoToHell

              # Use the server-local env file (outside git checkout) as the source of secrets.
              if [ ! -f ../.env ]; then
                echo "Missing server-local env file: ../.env (current directory: $(pwd))"
                exit 1
              fi

              git fetch origin dev
              git reset --hard origin/dev
              cp ../docker-compose.yaml .

              # Keep using the local server env file for docker compose variable resolution.
              ln -sf ../.env .env
              docker compose --env-file ../.env down
              docker compose --env-file ../.env up --build -d
          EOF

  sync-and-update-themes:
    name: Sync Backgrounds and Regenerate Themes
    runs-on: ubuntu-latest
    needs:
      - deploy-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Validate deployment secrets
        run: |
          set -e

          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS_HOST is not set!"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "VPS_USER is not set!"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "VPS_SSH_KEY is not set!"
            exit 1
          fi

      - name: Configure SSH access
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync background images to Openinary
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s <<'EOF'
              set -e

              cd /home/kurama/ds/gotohell/GoToHell

              set -a
              . ../.env
              set +a

              if [ -z "${OPENINARY_API_KEY:-}" ]; then
                echo "OPENINARY_API_KEY is missing in ../.env"
                exit 1
              fi

              if [ -z "${OPENINARY_URL:-}" ]; then
                echo "OPENINARY_URL is missing in ../.env"
                exit 1
              fi

              # Ensure Python deps are available
              if [[ ! -d tools/.venv ]]; then
                echo "Creating Python virtual environment"
                python3 -m venv tools/.venv
              fi
              tools/.venv/bin/pip install -q -r tools/requirements.txt

              echo "Syncing backgrounds to Openinary at ${OPENINARY_URL} with tools/sync_to_openinary.py"
              OPENINARY_API_KEY="${OPENINARY_API_KEY}" \
                tools/.venv/bin/python tools/sync_to_openinary.py \
                  --url "${OPENINARY_URL}"
          EOF

      - name: Regenerate themes.json
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s <<'EOF'
              set -e

              cd /home/kurama/ds/gotohell/GoToHell

              set -a
              . ../.env
              set +a

              echo "Regenerating themes.json with tools/regenerate_themes_from_openinary.py"
              OPENINARY_API_KEY="${OPENINARY_API_KEY}" \
                tools/.venv/bin/python tools/regenerate_themes_from_openinary.py \
                  --url "${OPENINARY_URL}"
          EOF

      - name: Restart frontend container
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s <<'EOF'
              set -e

              cd /home/kurama/ds/gotohell/GoToHell

              docker compose --env-file ../.env up --build -d frontend
          EOF
