name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  frontend-ci:
    name: Frontend CI (Test + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: src/frontend
        run: npm install

      - name: Run frontend unit tests
        working-directory: src/frontend
        run: npm test -- --run

      - name: Build frontend
        run: npm run build
        working-directory: src/frontend

  backend-ci:
    name: Backend CI (Test + Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go 1.24
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Sync Go modules
        working-directory: src/backend/src
        run: go mod tidy

      - name: Run backend tests
        working-directory: src/backend/src
        run: go test ./...

      - name: Build backend binary
        working-directory: src/backend/src
        run: go build -o server

  deploy-dev:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
      - backend-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    steps:
      - name: Validate deployment secrets
        run: |
          set -e

          # Check required secrets
          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS_HOST is not set!"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_USER }}" ]; then
            echo "VPS_USER is not set! (Repo -> Settings -> Secrets and variables -> actions)"
            exit 1
          fi

          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "VPS_SSH_KEY is not set! (Repo -> Settings -> Secrets and variables -> actions)"
            exit 1
          fi

      - name: Configure SSH access
        run: |
          set -e

          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy application via SSH and Docker Compose
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s <<'EOF'
              set -e

              cd /home/kurama/ds/gotohell/GoToHell

              THEMES_PATH="src/frontend/src/theme/themes.json"
              BACKUP_DATE="$(date +%Y%m%d-%H%M%S)"
              THEMES_BACKUP="/tmp/gotohell-themes-${BACKUP_DATE}.json.backup"

              # Use the server-local env file (outside git checkout) as the source of secrets.
              if [ ! -f ../.env ]; then
                echo "Missing server-local env file: ../.env (current directory: $(pwd))"
                exit 1
              fi

              if [ -f "${THEMES_PATH}" ]; then
                cp "${THEMES_PATH}" "${THEMES_BACKUP}"
                echo "Backed up ${THEMES_PATH} -> ${THEMES_BACKUP}"
              else
                echo "No existing ${THEMES_PATH} found to back up"
              fi

              git fetch origin dev
              git reset --hard origin/dev

              if [ -f "${THEMES_BACKUP}" ]; then
                cp "${THEMES_BACKUP}" "${THEMES_PATH}"
                rm -f "${THEMES_BACKUP}"
                echo "Restored ${THEMES_PATH} from backup"
              fi

              cp ../docker-compose.yaml .

              # Keep using the local server env file for docker compose variable resolution.
              ln -sf ../.env .env
              docker compose --env-file ../.env down
              docker compose --env-file ../.env up --build -d
          EOF
